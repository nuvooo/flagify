<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SDK Debug Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
    h1 { color: #fff; }
    .config { background: #333; padding: 15px; margin: 10px 0; border-radius: 5px; }
    .config label { display: block; margin: 10px 0; color: #fff; }
    .config input { width: 100%; padding: 5px; background: #222; color: #0f0; border: 1px solid #555; }
    button { padding: 10px 20px; margin: 5px; background: #0a0; color: white; border: none; cursor: pointer; }
    button:hover { background: #0d0; }
    .logs { background: #000; padding: 15px; margin-top: 20px; border-radius: 5px; height: 400px; overflow-y: auto; }
    .log-entry { margin: 2px 0; }
    .log-entry.error { color: #f55; }
    .log-entry.warn { color: #ff5; }
    .log-entry.info { color: #55f; }
    .result { background: #222; padding: 10px; margin: 5px 0; border-left: 3px solid #0f0; }
  </style>
</head>
<body>
  <h1>🧪 Togglely SDK Debug Test</h1>
  
  <div class="config">
    <h3>Configuration</h3>
    <label>
      Base URL:
      <input type="text" id="baseUrl" value="https://api.togglely.de" placeholder="https://api.togglely.de">
    </label>
    <label>
      API Key:
      <input type="text" id="apiKey" value="" placeholder="togglely_sdk_xxx">
    </label>
    <label>
      Project:
      <input type="text" id="project" value="my-project" placeholder="my-project">
    </label>
    <label>
      Environment:
      <input type="text" id="environment" value="production" placeholder="production">
    </label>
    <label>
      Flag Key:
      <input type="text" id="flagKey" value="dark-mode" placeholder="dark-mode">
    </label>
  </div>
  
  <button onclick="testDirectFetch()">1. Test Direct Fetch (no SDK)</button>
  <button onclick="testWithSDK()">2. Test With SDK</button>
  <button onclick="testIsEnabled()">3. Test isEnabled()</button>
  <button onclick="clearLogs()">Clear Logs</button>
  
  <div class="logs" id="logs"></div>

  <!-- Load SDK from local build -->
  <script type="module">
    import { TogglelyClient } from './sdk/core/dist/index.esm.js';
    window.TogglelyClient = TogglelyClient;
    log('SDK loaded successfully', 'info');
  </script>
  
  <script>
    const logs = document.getElementById('logs');
    
    function log(message, type = '') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logs.appendChild(entry);
      logs.scrollTop = logs.scrollHeight;
      console.log(message);
    }
    
    function getConfig() {
      return {
        baseUrl: document.getElementById('baseUrl').value,
        apiKey: document.getElementById('apiKey').value,
        project: document.getElementById('project').value,
        environment: document.getElementById('environment').value,
        flagKey: document.getElementById('flagKey').value
      };
    }
    
    async function testDirectFetch() {
      const { baseUrl, apiKey, project, environment, flagKey } = getConfig();
      log('=== TEST 1: Direct Fetch (Browser fetch) ===', 'info');
      
      try {
        const url = `${baseUrl}/sdk/flags/${project}/${environment}/${flagKey}?apiKey=${apiKey}`;
        log(`Fetching: ${url}`);
        
        const response = await fetch(url);
        log(`Status: ${response.status}`);
        
        const data = await response.json();
        log(`Response: ${JSON.stringify(data, null, 2)}`);
        
        if (data.enabled === false) {
          log('⚠️ Flag is DISABLED - check Dashboard!', 'warn');
        } else {
          log('✅ Flag is ENABLED', 'info');
        }
      } catch (err) {
        log(`❌ Error: ${err.message}`, 'error');
      }
    }
    
    async function testWithSDK() {
      const { baseUrl, apiKey, project, environment, flagKey } = getConfig();
      log('=== TEST 2: With SDK (getValue) ===', 'info');
      
      if (!window.TogglelyClient) {
        log('❌ SDK not loaded yet!', 'error');
        return;
      }
      
      try {
        const client = new window.TogglelyClient({
          baseUrl,
          apiKey,
          project,
          environment,
          offlineFallback: false, // Disable to see real errors
          autoFetch: false
        });
        
        log('SDK client created');
        const value = await client.getValue(flagKey);
        log(`SDK returned: ${JSON.stringify(value, null, 2)}`);
        
        if (value === null) {
          log('⚠️ SDK returned null - flag not found or error', 'warn');
        } else if (value.enabled === false) {
          log('⚠️ Flag is DISABLED in SDK response', 'warn');
        } else {
          log('✅ SDK returned enabled flag!', 'info');
        }
      } catch (err) {
        log(`❌ SDK Error: ${err.message}`, 'error');
      }
    }
    
    async function testIsEnabled() {
      const { baseUrl, apiKey, project, environment, flagKey } = getConfig();
      log('=== TEST 3: SDK isEnabled() ===', 'info');
      
      if (!window.TogglelyClient) {
        log('❌ SDK not loaded yet!', 'error');
        return;
      }
      
      try {
        const client = new window.TogglelyClient({
          baseUrl,
          apiKey,
          project,
          environment,
          offlineFallback: false,
          autoFetch: false
        });
        
        log('Calling isEnabled()...');
        const enabled = await client.isEnabled(flagKey, false);
        log(`isEnabled() returned: ${enabled}`);
        
        if (enabled === false) {
          log('⚠️ isEnabled() is FALSE - this is the problem!', 'warn');
        } else {
          log('✅ isEnabled() is TRUE!', 'info');
        }
      } catch (err) {
        log(`❌ SDK Error: ${err.message}`, 'error');
      }
    }
    
    function clearLogs() {
      logs.innerHTML = '';
    }
    
    window.testDirectFetch = testDirectFetch;
    window.testWithSDK = testWithSDK;
    window.testIsEnabled = testIsEnabled;
    window.clearLogs = clearLogs;
  </script>
</body>
</html>
