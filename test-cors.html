<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CORS Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
    input { width: 400px; padding: 5px; background: #333; color: #fff; border: 1px solid #555; }
    button { padding: 10px 20px; margin: 5px; background: #0a0; color: white; border: none; cursor: pointer; }
    button:hover { background: #0d0; }
    .result { background: #000; padding: 10px; margin: 10px 0; border-radius: 5px; }
    .success { color: #0f0; }
    .error { color: #f55; }
    .info { color: #55f; }
  </style>
</head>
<body>
  <h1>🌐 CORS Test</h1>
  
  <div>
    <label>Backend URL: <input id="url" value="https://api.togglely.de" /></label><br><br>
    <label>API Key: <input id="key" value="togglely_demo_key" /></label><br><br>
    <label>Project: <input id="project" value="demo-project" /></label><br><br>
    <label>Environment: <input id="env" value="development" /></label><br><br>
    <label>Flag: <input id="flag" value="test-flag" /></label>
  </div>
  
  <button onclick="testHealth()">Test Health (no auth)</button>
  <button onclick="testSDK()">Test SDK (with API key)</button>
  <button onclick="testPreflight()">Test Preflight (OPTIONS)</button>
  
  <div id="results"></div>

  <script>
    const results = document.getElementById('results');
    
    function log(msg, type = '') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      results.appendChild(div);
    }
    
    function getUrl() {
      return document.getElementById('url').value;
    }
    
    async function testHealth() {
      log('Testing /health...', 'info');
      try {
        const response = await fetch(`${getUrl()}/health`);
        const data = await response.json();
        log(`✅ Status: ${response.status}`, 'success');
        log(`Response: ${JSON.stringify(data)}`);
        
        const cors = response.headers.get('access-control-allow-origin');
        if (cors) {
          log(`CORS header: ${cors}`, 'success');
        } else {
          log('No CORS header (OK for same-origin)', 'info');
        }
      } catch (err) {
        log(`❌ Error: ${err.message}`, 'error');
      }
    }
    
    async function testSDK() {
      const url = `${getUrl()}/sdk/flags/${project.value}/${env.value}/${flag.value}?apiKey=${key.value}`;
      log(`Testing SDK: ${url}`, 'info');
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        log(`Status: ${response.status}`, response.ok ? 'success' : 'error');
        log(`Response: ${JSON.stringify(data, null, 2)}`);
        
        if (data.enabled === false) {
          log('⚠️ Flag is DISABLED', 'error');
        } else if (data.enabled === true) {
          log('✅ Flag is ENABLED', 'success');
        }
      } catch (err) {
        log(`❌ Error: ${err.message}`, 'error');
        if (err.message.includes('CORS')) {
          log('This is a CORS error! Check backend CORS_ORIGINS setting.', 'error');
        }
      }
    }
    
    async function testPreflight() {
      const url = `${getUrl()}/sdk/flags/${project.value}/${env.value}/${flag.value}`;
      log(`Testing OPTIONS preflight...`, 'info');
      
      try {
        const response = await fetch(url, {
          method: 'OPTIONS',
          headers: {
            'Origin': window.location.origin,
            'Access-Control-Request-Method': 'GET',
            'Access-Control-Request-Headers': 'Content-Type'
          }
        });
        log(`Status: ${response.status}`, 'success');
        
        response.headers.forEach((value, key) => {
          if (key.toLowerCase().includes('access')) {
            log(`${key}: ${value}`, 'success');
          }
        });
      } catch (err) {
        log(`❌ Error: ${err.message}`, 'error');
      }
    }
  </script>
</body>
</html>
